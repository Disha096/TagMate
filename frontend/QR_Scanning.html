<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #ff6b35;
            --accent: #f7b801;
            --dark: #0f0f1a;
            --card: #1a1a2e;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #222244, #0f0f1a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .container {
            width: 420px;
            background: rgba(26, 26, 46, .9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, .6);
            text-align: center;
        }

        /* Title */
        h2 {
            margin-bottom: 18px;
        }

        /* Camera Box */
        #reader {
            width: 100%;
            height: 320px;
            border-radius: 15px;
            overflow: hidden;
            background: black;
            border: 1px solid rgba(255, 255, 255, .08);
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .25s;
        }

        .start {
            background: linear-gradient(135deg, #ff6b35, #f7b801);
            color: white;
        }

        .stop {
            background: #ff4d4d;
            color: white;
        }

        .secondary {
            background: rgba(255, 255, 255, .08);
            color: white;
        }

        .secondary:hover {
            background: rgba(255, 255, 255, .15);
        }

        /* fullscreen */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
        }

        .fullscreen #reader {
            height: 100vh;
            border-radius: 0;
        }
    </style>

</head>

<body>

    <div class="container" id="container">
        <h2>QR Code Scanner</h2>

        <div id="reader"></div>

        <button class="start" onclick="startCamera()">Start Camera</button>
        <button class="stop" onclick="stopCamera()">Stop Camera</button>
        <button class="secondary" onclick="toggleTorch()" id="torchBtn" style="display:none">Flash / Torch</button>
        <button class="secondary" onclick="toggleFullscreen()">Fullscreen</button>

        <h3 id="result"></h3>

    </div>
    <script>
        let html5QrCode;
        let torchOn = false;

        async function startCamera() {
            if (html5QrCode) return;

            html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 10,
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                    const size = Math.min(viewfinderWidth, viewfinderHeight) * 0.7;
                    return { width: size, height: size };
                }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }
                    ,
                    config,
                    onScanSuccess,
                    onScanError
                );

                const capabilities = html5QrCode.getRunningTrackCapabilities?.();
                if (capabilities?.torch) {
                    document.getElementById("torchBtn").style.display = "block";
                }
            } catch (err) {
                alert("Camera error: " + err);
            }
        }

        function onScanSuccess(decodedText) {

            localStorage.setItem("scannedTagID", decodedText);

            setTimeout(() => {
                window.location.href = "staffDashboard.html";
            }, 500);
        }


        function onScanError(error) {
            // Uncomment for debugging
            // console.warn("Scan error:", error);
        }

        async function stopCamera() {
            if (html5QrCode) {
                await html5QrCode.stop();
                await html5QrCode.clear();
                html5QrCode = null;
            }
            document.getElementById("torchBtn").style.display = "none";
        }

        async function toggleTorch() {
            torchOn = !torchOn;
            await html5QrCode.applyVideoConstraints({
                advanced: [{ torch: torchOn }]
            });
        }

        function toggleFullscreen() {
            document.getElementById("container").classList.toggle("fullscreen");
        }
    </script>


</body>

</html>
